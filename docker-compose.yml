version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ecobook-db
    environment:
      POSTGRES_DB: ecobook
      POSTGRES_USER: ecobook
      POSTGRES_PASSWORD: dev_password_123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecobook"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecobook-network

networks:
  ecobook-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
