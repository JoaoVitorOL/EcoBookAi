name: Build and Test

on:
  push:
    branches: [master, main, develop, 001-ecobook-core]
  pull_request:
    branches: [master, main, develop, 001-ecobook-core]

jobs:
  build:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ecobook_test
          POSTGRES_USER: ecobook_test
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Build with Maven
      run: mvn clean compile
      working-directory: backend
    
    - name: Run tests
      run: mvn test -DskipTests=false
      working-directory: backend
      env:
        SPRING_PROFILES_ACTIVE: test
    
    - name: Generate code coverage report
      run: mvn jacoco:report
      working-directory: backend
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        files: ./backend/target/site/jacoco/jacoco.xml
        fail_ci_if_error: false
    
    - name: Check code coverage
      run: |
        COVERAGE=$(grep -oP 'line-rate="\K[^"]*' backend/target/site/jacoco/jacoco.xml | head -1)
        echo "Code Coverage: $COVERAGE"
        if (( $(echo "$COVERAGE < 0.50" | bc -l) )); then
          echo "Warning: Code coverage is below 50%"
        fi

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Run CheckStyle
      run: mvn checkstyle:check
      working-directory: backend
      continue-on-error: true
