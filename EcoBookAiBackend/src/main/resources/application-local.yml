spring:
  datasource:
    url: jdbc:h2:file:./data/ecobook-local;MODE=PostgreSQL;AUTO_SERVER=TRUE;INIT=RUNSCRIPT FROM 'classpath:db/local/h2-compat.sql'
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false

  flyway:
    enabled: false

logging:
  level:
    root: INFO
    com.ecobook: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: WARN

server:
  address: 0.0.0.0
